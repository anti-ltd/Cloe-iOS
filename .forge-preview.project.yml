# XcodeGen manifest. `make project` regenerates Cloe.xcodeproj from this.
# Keep the manifest as the source of truth — never edit the generated .xcodeproj
# by hand or the next `make project` will clobber it.

name: Cloe
options:
  bundleIdPrefix: ltd.anti
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 8248296AJX
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  iUX-ios:
    path: ../iUX-ios
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.29.1"

targets:

  ForgePreviewSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Sources/__ForgePreview__]
    dependencies:
      - target: Cloe
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets:
        - ForgePreviewSnapshotTests
  Cloe:
    type: application
    platform: iOS
    sources:
      - Sources/Cloe
      - Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Cloe
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - package: iUX-ios
        product: iUXiOS
      - sdk: FoundationModels.framework
      - package: mlx-swift-examples
        product: MLXLLM
      - package: mlx-swift-examples
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ltd.anti.cloe
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
